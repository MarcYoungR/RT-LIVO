common:
  img_topic: "/camera/color/image_raw"
  lid_topic: "/livox/lidar"
  imu_topic: "/livox/imu"
  img_en: 1
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  extrinsic_T: [0.04165, 0.02326, -0.0284]
  extrinsic_R: [1, 0, 0, 0, 1, 0, 0, 0, 1]
  Rcl: [-0.0300215,-0.990732,0.132475,
        0.00477201,-0.132675,-0.991148,
        0.999538,-0.0291236,0.00871089] 
  Pcl: [-0.0828877, 0.13802,0.0133933]

time_offset: 
  imu_time_offset: 0.0
  img_time_offset: 0.1
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 1
  filter_size_surf: 0.1
  lidar_type: 1 # Livox Avia LiDAR
  scan_line: 6
  blind: 0.8

vio:
  max_iterations: 5
  outlier_threshold: 1000 # 78 100 156 #100 200 500 700 infinite
  img_point_cov: 1000 # 100 1000 
  patch_size: 8
  patch_pyrimid_level: 4
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: true
  inv_expo_cov: 0.1

imu:
  imu_en: true
  imu_int_frame: 30
  acc_cov: 0.5 # 0.2
  gyr_cov: 0.3 # 0.5
  b_acc_cov: 0.0001 # 0.1
  b_gyr_cov: 0.0001 # 0.1

lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.05
  min_eigen_value: 0.0025 # 0.005
  voxel_size: 0.5
  max_layer: 2
  max_points_num: 50
  layer_init_num: [5, 5, 5, 5, 5]

local_map:  
  map_sliding_en: false
  half_map_size: 100
  sliding_thresh: 8

uav:
  imu_rate_odom: false
  gravity_align_en: false

publish:
  dense_map_en: true   # 【关键】启用密集地图，显示完整点云

  pub_effect_point_en: false
  pub_plane_en: false
  pub_scan_num: 1
  blind_rgb_points: 0.0

evo:
  seq_name: "CBD_Building_01"
  pose_output_en: false

pcd_save:
  pcd_save_en: true     # 【启用PCD保存】设置为 true 即可保存点云地图
  colmap_output_en: false
  filter_size_pcd: 0.15
  interval: -1  

rtdetr:
  enable: true              # 【关键】总开关，必须为 true
  model_name: "model.onnx"  # 模型文件名，需在 weights 文件夹下
  conf_thresh: 0.6         # 置信度阈值 (建议 0.25 - 0.45)
  padding: 20               # 掩码膨胀像素 (建议 10 - 20)，扩大检测框以覆盖边界

  # 自适应 img_point_cov 参数（根据动态目标面积比例调整）
  adaptive_cov:
    enable: true            # 是否启用自适应调整
    min_value: 200.0        # 无动态目标时的协方差值 (m=0)
    max_value: 2000.0       # 全覆盖时的协方差值 (m=1)
